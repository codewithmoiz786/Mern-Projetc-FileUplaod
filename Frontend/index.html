<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetched Images with my own API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .posts {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            background-color: #e6e1e1;
            padding: 10px;
            gap: 10px;
            overflow: auto;
        }

        .post {
            width: 290px;
            height: fit-content;
            background-color: #999;
            border-radius: 10px;
            overflow: hidden;
        }

        img {
            object-fit: cover;
            width: 100%;
            height: 160px;
            background-color: rgb(48, 48, 48);
        }

        p {
            font-size: 1rem;
            font-weight: 500;
            width: 100%;
            margin: 10px;
            font-family: sans-serif;
        }

        h1 {
            padding: 10px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        h4 {
            margin: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <h1>User Images</h1>
    <div class="posts">

    </div>
    <script>
        fetch('http://localhost:3000/post/files').then((res) => res.json()).then((data) => {
            data.allFiles.forEach(user => {
                let posts = document.querySelector('.posts')
                let post = document.createElement('div')
                post.classList.add('post')
                post.innerHTML = ` <img src="${user.uri}" alt="">
                <h4>Title</h4>
            <p>${user.caption}</p>`
                posts.appendChild(post)
            });
        })
    </script>
</body>

</html>
